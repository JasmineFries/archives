function $(id){return document.getElementById(id)}
var ans=[];for(var i=0;i<40;i++) ans[i]=-1;
var cur=0;

$("btnGo").onclick=function(){
  $("P0").style.display="none";
  $("P1").style.display="";
  show(0);
};

function show(n){
  cur=n;
  var d=D[n];
  var pct=Math.round((n/40)*100);
  $("pf").style.width=pct+"%";
  $("pn").textContent=(n+1)+" / 40";
  var h='<div class="qcard"><div class="qn">Q'+(n+1)+'</div><div class="qt">'+d.q+'</div><div class="opts">';
  for(var j=0;j<d.o.length;j++){
    h+='<button class="ob'+(ans[n]===j?' sel':'')+'" data-j="'+j+'">'+d.o[j][0]+'</button>';
  }
  h+='</div></div>';
  $("qw").innerHTML=h;
  $("bp").style.display=n===0?"none":"";
  $("bn").textContent=n===39?"\u67E5\u770B\u7ED3\u679C":"\u4E0B\u4E00\u9898";
  $("bn").disabled=ans[n]===-1;
  var btns=$("qw").querySelectorAll(".ob");
  for(var j=0;j<btns.length;j++){
    btns[j].onclick=function(){
      var idx=parseInt(this.getAttribute("data-j"));
      ans[cur]=idx;
      var all=$("qw").querySelectorAll(".ob");
      for(var k=0;k<all.length;k++) all[k].className="ob";
      this.className="ob sel";
      $("bn").disabled=false;
    };
  }
}

$("bp").onclick=function(){if(cur>0) show(cur-1)};
$("bn").onclick=function(){
  if(ans[cur]===-1) return;
  if(cur<39) show(cur+1);
  else result();
};

function result(){
  $("P1").style.display="none";
  var sc={h:0,c:0,u:0,s:0,l:0,z:0,f:0,d:0};
  for(var i=0;i<40;i++){
    if(ans[i]===-1) continue;
    var pts=D[i].o[ans[i]][1];
    for(var k in pts) sc[k]+=pts[k];
  }
  var arr=[];
  for(var k in sc) arr.push([k,sc[k]]);
  arr.sort(function(a,b){return b[1]-a[1]});
  var mx=arr[0][1]||1;
  var r=R[arr[0][0]];
  var dual="";
  if(arr[1][1]>=arr[0][1]*0.8){
    var r2=R[arr[1][0]];
    dual='<div class="dual">\u4F60\u540C\u65F6\u62E5\u6709 <b>'+r.n+'</b> \u548C <b>'+r2.n+'</b> \u7684\u7279\u8D28\uFF0C\u662F\u7F55\u89C1\u7684<b>\u53CC\u4FEE</b>\u4F53\u8D28\uFF01</div>';
  }
  var bars="";
  for(var i=0;i<arr.length;i++){
    var ri=R[arr[i][0]];
    var pct=Math.round((arr[i][1]/mx)*100);
    bars+='<div class="bi"><div class="bl"><span>'+ri.i+" "+ri.n+'</span><span>'+arr[i][1]+'</span></div><div class="bt"><div class="bf" style="width:'+pct+'%;background:'+ri.k+'"></div></div></div>';
  }
  $("P2").style.display="";
  $("P2").className="res";
  $("P2").innerHTML='<div class="res-icon">'+r.i+'</div><div class="res-name">'+r.n+'</div><div class="res-motto">'+r.m+'</div><div class="res-box">'+r.t.replace(/\n/g,"<br>")+dual+'</div><div class="res-box"><h3>\uD83D\uDCCA \u4F60\u7684\u4FEE\u70BC\u5C5E\u6027\u5206\u5E03</h3>'+bars+'</div><button class="btn-re" onclick="re()">\u91CD\u65B0\u6D4B\u8BD5</button><div class="share">\u622A\u56FE\u5206\u4EAB\u7ED9\u670B\u53CB\uFF0C\u770B\u770B\u4ED6\u4EEC\u662F\u4EC0\u4E48\u4FEE\u58EB</div>';
}

function re(){
  for(var i=0;i<40;i++) ans[i]=-1;
  $("P2").style.display="none";
  $("P0").style.display="";
}
</script>
